name: DevSecOps CI Pipeline

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Build da Imagem Docker
      run: |
        echo "Iniciando a compilação do ambiente..."
        docker build -t task-manager-app .
        echo "Build finalizado com sucesso!"

  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Instalar Dependências
      run: |
        echo "Instalando dependências para teste..."
        pip install -r requirements.txt

    - name: Validar Sintaxe (Testes)
      run: |
        echo "Validando a integridade do código fonte..."
        python -m py_compile todo_project/run.py
        python -m py_compile todo_project/todo_project/models.py
        python -m py_compile todo_project/todo_project/routes.py
        echo "Todos os testes passaram!"

  sast:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Instalar ferramentas SAST (Bandit e Safety)
      run: |
        pip install bandit safety

    - name: Análise Estática de Código (Bandit)
      run: |
        echo "Buscando vulnerabilidades no código Python..."
        bandit -r todo_project/ || true

    - name: Análise de Dependências (Safety)
      run: |
        echo "Buscando pacotes vulneráveis..."
        safety check -r requirements.txt || true

  cd_stage_dast:
    runs-on: ubuntu-latest
    needs: sast
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Deploy no Ambiente de Stage (Container Local)
      run: |
        echo "Subindo aplicação no ambiente de Stage..."
        docker build -t task-manager-app -f Dockerfile .
        docker run -d -p 5000:5000 --name stage-app task-manager-app
        sleep 5 

    - name: Teste Dinâmico de Segurança (OWASP ZAP DAST)
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://localhost:5000'
        fail_action: true
